<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tips - 연동 완료</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; border-radius: 16px; padding: 48px; max-width: 560px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .success-icon { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 24px; margin-bottom: 12px; color: #1a1a1a; }
        .success h1 { color: #2e7d32; }
        .error h1 { color: #fe2c55; }
        p { color: #666; margin-bottom: 24px; line-height: 1.6; }
        .code-box { background: #f0f7f0; border: 1px solid #c8e6c9; border-radius: 8px; padding: 16px; margin: 16px 0; word-break: break-all; font-family: monospace; font-size: 13px; color: #333; text-align: left; }
        .error .code-box { background: #fff3f3; border-color: #ffcdd2; }
        .copy-btn { display: inline-block; background: #fe2c55; color: white; padding: 10px 24px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .copy-btn:hover { background: #e0284d; }
        .copied { background: #2e7d32 !important; }
        .instructions { background: #f8f8f8; border-radius: 8px; padding: 16px; margin-top: 20px; text-align: left; font-size: 14px; color: #555; line-height: 1.8; }
        .instructions strong { color: #333; }
        .home-link { display: inline-block; margin-top: 20px; color: #fe2c55; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="success-icon">⏳</div>
        <h1>처리 중...</h1>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const error = params.get("error");
        const container = document.getElementById("content");

        if (code) {
            container.className = "container success";
            container.innerHTML = `
                <div class="success-icon">✅</div>
                <h1>TikTok 연동 성공!</h1>
                <p>TikTok 계정이 Study Tips와 성공적으로 연동되었습니다.</p>
                <div class="code-box">
                    <strong>Authorization Code:</strong><br><br>
                    <span id="authCode">${code}</span>
                </div>
                <button class="copy-btn" onclick="copyCode()">코드 복사하기</button>
                <div class="instructions">
                    <strong>📋 다음 단계:</strong><br>
                    1. 위 코드를 복사하세요<br>
                    2. 분석 스크립트에 코드를 입력하세요<br>
                    3. 영상 성과 데이터가 자동으로 수집됩니다
                </div>
                <a href="index.html" class="home-link">← 처음으로 돌아가기</a>
            `;
        } else if (error) {
            container.className = "container error";
            container.innerHTML = `
                <div class="success-icon">❌</div>
                <h1>연동 실패</h1>
                <p>TikTok 로그인이 거부되었거나 오류가 발생했습니다.</p>
                <div class="code-box">
                    Error: ${error}<br>
                    ${params.get("error_description") || ""}
                </div>
                <a href="index.html" class="home-link">← 다시 시도하기</a>
            `;
        } else {
            container.innerHTML = `
                <div class="success-icon">⚠️</div>
                <h1>잘못된 접근</h1>
                <p>TikTok 로그인을 통해 접근해주세요.</p>
                <a href="index.html" class="home-link">← 처음으로 돌아가기</a>
            `;
        }

        function copyCode() {
            const code = document.getElementById("authCode").textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.querySelector(".copy-btn");
                btn.textContent = "복사 완료!";
                btn.classList.add("copied");
                setTimeout(() => {
                    btn.textContent = "코드 복사하기";
                    btn.classList.remove("copied");
                }, 2000);
            });
        }
    </script>
</body>
</html>
